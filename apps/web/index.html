<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/textile-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Kattali Textile Limited (KTL) | Leading Woven Garment Manufacturer in
      Bangladesh
    </title>

    <!-- Default SEO meta tags for non-JS crawlers -->
    <meta
      name="description"
      content="Kattali Textile Limited (KTL) is a publicly listed garment manufacturer in Chittagong, Bangladesh. We produce high-quality woven, denim, and children's apparel for international apparel buyers, sourcing managers, and brands importing from Asia, with export reach to the USA, EU, and Canada. Compliance programs include Sedex, OEKO-TEX Standard 100, BSCI, WRAP, GOTS, and ISO 9001:2015—see our Certifications hub."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://ktlbd.com/" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Kattali Textile Limited (KTL) | Leading Woven Garment Manufacturer in Bangladesh"
    />
    <meta
      property="og:description"
      content="Publicly listed Bangladesh garment manufacturer for international apparel buyers, sourcing managers, and brands importing from Asia, with export reach to the USA, EU, and Canada. Compliance: Sedex, OEKO-TEX, BSCI, WRAP, GOTS, ISO 9001:2015."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ktlbd.com/" />
    <meta property="og:image" content="https://ktlbd.com/logos/ktl-logo.webp" />
    <meta property="og:site_name" content="Kattali Textile Ltd" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Kattali Textile Limited (KTL) | Leading Woven Garment Manufacturer in Bangladesh"
    />
    <meta
      name="twitter:description"
      content="Publicly listed Bangladesh garment manufacturer for international apparel buyers, sourcing managers, and brands importing from Asia, with export reach to the USA, EU, and Canada. Compliance: Sedex, OEKO-TEX, BSCI, WRAP, GOTS, ISO 9001:2015."
    />
    <meta
      name="twitter:image"
      content="https://ktlbd.com/logos/ktl-logo.webp"
    />
    <meta name="twitter:site" content="@KTLManufacturing" />
    <meta name="twitter:creator" content="@KTLManufacturing" />

    <!-- Preconnect to font services for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin />

    <!-- Preload critical hero image for faster LCP -->
    <link
      rel="preload"
      as="image"
      href="/assets/hero.jpg"
      fetchpriority="high"
    />

    <!-- Glacial Indifference (SIL OFL) — home “years of operation” block -->
    <link
      href="https://fonts.cdnfonts.com/css/glacial-indifference"
      rel="stylesheet"
    />

    <!-- Optimized font loading with font-display: swap -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
